<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }

        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #f0f0f0;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
            min-height: 3.2em;
        }

        .product-category {
            font-size: 0.85rem;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-description {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.4;
            flex-grow: 1;
        }

        .product-rating {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .stars {
            color: #ffc107;
            font-size: 1rem;
            margin-right: 8px;
        }

        .rating-text {
            color: #666;
            font-size: 0.9rem;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .product-stock {
            font-size: 0.9rem;
            padding: 5px 12px;
            border-radius: 20px;
            background-color: #e7f0ff;
            color: #667eea;
            font-weight: 500;
        }

        .stock-out {
            background-color: #ffe7e7;
            color: #ff6b6b;
        }

        .filter-section {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background-color: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background-color: white;
            color: #667eea;
        }

        .filter-btn.active {
            background-color: white;
            color: #667eea;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }

            .filter-section {
                margin-bottom: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            header p {
                font-size: 1rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .product-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ Product Dashboard</h1>
            <p>Browse our collection of amazing products</p>
        </header>

        <div id="loading" class="loading">Loading products...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="filterSection" class="filter-section"></div>
        <div id="productsContainer" class="products-grid"></div>

        <footer>
            <p>&copy; 2026 Product Dashboard | Data from DummyJSON API</p>
        </footer>
    </div>

    <script>
        let allProducts = [];
        let filteredProducts = [];
        let categories = [];

        // Fetch products from API
        async function fetchProducts() {
            try {
                const response = await fetch("https://dummyjson.com/products?limit=50");
                if (!response.ok) throw new Error('Failed to fetch products');
                
                const data = await response.json();
                allProducts = data.products;
                filteredProducts = [...allProducts];
                
                // Extract unique categories
                categories = [...new Set(allProducts.map(p => p.category))];
                
                document.getElementById('loading').style.display = 'none';
                createFilterButtons();
                displayProducts(filteredProducts);
                console.log('Products loaded:', allProducts);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError('Error loading products: ' + error.message);
                console.error('Error:', error);
            }
        }

        // Create filter buttons
        function createFilterButtons() {
            const filterSection = document.getElementById('filterSection');
            filterSection.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.textContent = 'All Products';
            allBtn.className = 'filter-btn active';
            allBtn.onclick = () => filterByCategory('all');
            filterSection.appendChild(allBtn);

            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                btn.className = 'filter-btn';
                btn.onclick = () => filterByCategory(category);
                filterSection.appendChild(btn);
            });
        }

        // Filter products by category
        function filterByCategory(category) {
            if (category === 'all') {
                filteredProducts = [...allProducts];
            } else {
                filteredProducts = allProducts.filter(p => p.category === category);
            }

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            displayProducts(filteredProducts);
        }

        // Display products
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';

            if (products.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: white; font-size: 1.1rem;">No products found</p>';
                return;
            }

            products.forEach(product => {
                const card = createProductCard(product);
                container.appendChild(card);
            });
        }

        // Create product card
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';

            const imageUrl = product.thumbnail || (product.images && product.images[0]) || 'https://via.placeholder.com/280x250?text=No+Image';
            const rating = product.rating ? product.rating.toFixed(1) : 'N/A';
            const stars = generateStars(product.rating || 0);
            const stockStatus = product.stock > 0 ? `${product.stock} in stock` : 'Out of Stock';
            const stockClass = product.stock > 0 ? '' : 'stock-out';

            card.innerHTML = `
                <img src="${imageUrl}" alt="${product.title}" class="product-image" onerror="this.src='https://via.placeholder.com/280x250?text=No+Image'">
                <div class="product-info">
                    <div class="product-category">${product.category}</div>
                    <h3 class="product-title">${product.title}</h3>
                    <p class="product-description">${product.description || 'No description available'}</p>
                    <div class="product-rating">
                        <span class="stars">${stars}</span>
                        <span class="rating-text">${rating}/5 (${product.reviews?.length || 0} reviews)</span>
                    </div>
                    <div class="product-footer">
                        <span class="product-price">$${product.price.toFixed(2)}</span>
                        <span class="product-stock ${stockClass}">${stockStatus}</span>
                    </div>
                </div>
            `;

            return card;
        }

        // Generate star rating display
        function generateStars(rating) {
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 !== 0;
            let stars = '★'.repeat(fullStars);
            if (hasHalfStar) stars += '✩';
            stars += '☆'.repeat(5 - Math.ceil(rating));
            return stars;
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Load products on page load
        window.addEventListener('load', fetchProducts);
    </script>
</body>
</html>
